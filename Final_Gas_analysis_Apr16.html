function calculate ()
{ 
    var H2 = parseFloat(document.getElementById("H2").value);
    var He = parseFloat(document.getElementById("He").value);
    var N2 = parseFloat(document.getElementById("N2").value);
    var H2O = parseFloat(document.getElementById("H2O").value);
    var CO = parseFloat(document.getElementById("CO").value);
    var CO2 = parseFloat(document.getElementById("CO2").value);
    var H2S = parseFloat(document.getElementById("H2S").value); 
    var C1 = parseFloat(document.getElementById("C1").value);  
    var C2 = parseFloat(document.getElementById("C2").value);
    var C3 = parseFloat(document.getElementById("C3").value);
    var iC4 = parseFloat(document.getElementById("iC4").value);
    var nC4 = parseFloat(document.getElementById("nC4").value);
    var iC5 = parseFloat(document.getElementById("iC5").value);
    var nC5 = parseFloat(document.getElementById("nC5").value);
    var C6 = parseFloat(document.getElementById("C6").value);
    var C7 = parseFloat(document.getElementById("C7").value);
    var C8 = parseFloat(document.getElementById("C8").value);
 
    
      
    var Pressure = parseFloat(document.getElementById('Pressure').value);   
    var input1Type = document.getElementById('input1Type').value;
    if(input1Type === "psia" ){
        Pressure = Pressure * 1;
    }else if(input1Type === "kpaa" ){
        Pressure = Pressure * 0.145038;
    }else if(input1Type === "bara" ){
        Pressure = Pressure * 14.5038;
    }
       
    var Temperature = parseFloat(document.getElementById('Temperature').value);   
    var input2Type = document.getElementById('input2Type').value;
    if(input2Type === "F" ){
        Temperature = Temperature * 1;
    }else if(input2Type === "C" ){
        Temperature = (Temperature * 9/5)+32;
    }


    var total = (H2 + He + N2 + H2O + CO + CO2 + H2S + C1 + C2 + C3 + iC4 + nC4 + iC5 + nC5 + C6 + C7 + C8);
    var MW = (H2 * 2.016 + He * 4 + N2 * 28.02 + H2O * 18.01 + CO * 28.01 + CO2 * 44.01 +
        H2S * 34.08 + C1 * 16.04 + C2 * 30.07 + C3 * 44.10 + iC4 * 58.12 +
        nC4 * 58.12 + iC5 * 72.15 + nC5 * 72.15 + C6 * 86.18 + C7 * 100.21 +
        C8 * 114.23) / 100;    
    var SG = MW / 28.96;
    var Tr = (H2 * 59.7 + He * 9.7 + N2 * 227.5 + H2O * 1165.1 + CO * 239.5 + CO2 * 547.7 + H2S * 672.4 + C1 * 343.3 + C2 * 550.1 + C3 * 665.9 + iC4 * 734.4 +nC4 * 765.5 + iC5 * 829 + nC5 * 845.7 + C6 * 911.8 + C7 * 970.9 +  C8 * 1023.5 ) / 100;
    var Pr = (H2 * 187.5 + He * 32.99 + N2 * 492.8 + H2O * 3200.1 + CO * 506.8 + CO2 * 1069.5 + H2S * 1300 + C1 * 667 + C2 * 707.8 + C3 * 615 + iC4 * 527 + nC4 * 548 + iC5 * 490.4 + nC5 * 488.1 + C6 * 439.5 + C7 * 387.4 + C8 * 361.1) / 100;
    var CP = (H2 * 6.9 + He * 4.96 + N2 * 6.95 + H2O * 8.01 + CO * 6.96 + CO2 * 8.77 +  H2S * 8.11 + C1 * 8.48 + C2 * 12.37 + C3 * 17.21 + iC4 * 22.61 + nC4 * 22.82 + iC5 * 27.74 + nC5 * 28.15 + C6 * 33.43 + C7 * 38.75 + C8 * 42.99 ) / 100;
    var K = CP / (CP - 1.99);
    var RP = Pressure/Pr;
    var RT = (Temperature + 460)/Tr;
    //var A = 1.39 * ((RT - 0.92)**0.5) - (0.36 * RT) - 0.10;
    //var E = 9 * (RT - 1);
    //var B = ((0.62 - (0.23 * RT)) * RP ) + (((0.066 /(RT - 0.86)) - 0.037) * RP**2) + ((0.32 * RP**2)/(10**E));
    //var C = 0.132 - (0.32 * Math.log10(RT));  
    //var F = 0.3106 - (0.49 * RT) + (0.1824 * RT**2); 
   // var D = 10**F;
   // var Z = A + ((1-A)/(Math.exp(B))) + (C * (RP**D));
    var GUESS;
    var B119; 
    var Z_Z;
    var diff; 
    diff = Z_Z - GUESS;
   // B119 = 0.27 * RP/(RT*GUESS);
   Z_Z =(0.3265-1.07/RT-0.5339/RT**3-0.05165/RT**5)*B119+
   (0.5475-0.7361/RT+0.1884/RT**2)*B119**2-0.1056*
   (-0.7361/RT+0.1884/RT**2)*B119**5+0.6134*(1+0.721*B119**2)
   *B119**2/RT**3*Math.exp(-0.721*B119**2)+1;
    
    for (GUESS = 0.5;  GUESS < 1.2; GUESS=GUESS+0.001){
                
        B119 = 0.27 * RP/(RT*GUESS);
        Z_Z =(0.3265-1.07/RT-0.5339/RT**3-0.05165/RT**5)*B119+
   (0.5475-0.7361/RT+0.1884/RT**2)*B119**2-0.1056*
   (-0.7361/RT+0.1884/RT**2)*B119**5+0.6134*(1+0.721*B119**2)
   *B119**2/RT**3*Math.exp(-0.721*B119**2)+1;
   if(Z_Z - GUESS < 0.001) break
          
            
    }
    
    {
        document.getElementById("z1").value=total.toFixed(2); 
        document.getElementById("z2").value=MW.toFixed(2);

        document.getElementById("z4").value=K.toFixed(2);

        document.getElementById("z8").value=Z_Z.toFixed(3);
    }
}

<body>
    <img src="logo10.png" style="margin-left:30px" width=150 height="50">
    <h1 style="text-align: center; color: black;">Reciprocating Compressor Cylinders packing vent</h1>
      
  
    <div class="container">

                                <input type="text" class="boxes" id="n" value="6">
                            </div>    

<div class="wrapper">                       
    <label class="label">New packing</label>
        <div class="combine">
            <input type="text" class="boxes" id="ln" value="10">
                <div class="combine-addon">
                    <div class="drop-down-class">
    <select class="first" id="input1Type">
        <option value="scfh">scfh</option>
        <option value="l/min">l/min</option>
                    </select>
</div></div></div></div>

    
<div class="wrapper">

</div></div></div></div>

 <div class="wrapper">

<script>

function myFunction1() {
    var x = document.getElementById("myDIV");
  if (x.style.display === "block") {
    x.style.display = "none";
  } else {
    x.style.display = "block";
  }
}
function calculate () {   
var ln = parseFloat(document.getElementById('ln').value);
var input1Type = document.getElementById('input1Type').value;
if(input1Type === "scfh" ){
    ln = ln * 1;
}else if(input1Type === "l/min" ){
    ln = ln * 0.47;
}

var lnp = parseFloat(document.getElementById('lnp').value);
var input2Type = document.getElementById('input2Type').value;
if(input2Type === "scfh" ){
    lnp = lnp * 1;
}else if(input2Type === "l/min" ){
    lnp = lnp * 0.47;
}

var lw = parseFloat(document.getElementById('lw').value);
var input3Type = document.getElementById('input3Type').value;
if(input3Type === "scfh" ){
    lw = lw * 1;
}else if(input3Type === "l/min" ){
    lw = lw * 0.47;
}

var lwp = parseFloat(document.getElementById('lwp').value);
var input4Type = document.getElementById('input4Type').value;
if(input4Type === "scfh" ){
    lwp = lwp * 1;
}else if(input4Type === "l/min" ){
    lwp = lwp * 0.47;
}


    var n = parseFloat(document.getElementById("n").value);
    
       
    var leakn = n*ln;
    var leakn_l = leakn * 0.47;
    var leaknp = n*lnp;
    var leaknp_l = leaknp * 0.47;
    var leakw = (n-1)*ln+lw;
    var leakw_l = leakw * 0.47;
    var leakwp = (n-1)*lnp+lwp;
    var leakwp_l = leakwp * 0.47;
    {
    
        document.getElementById("ans1").value=leakn.toFixed(1)+' SCFH'+" ("+leakn_l.toFixed(0)+" L/min)";
        document.getElementById("ans2").value=leaknp.toFixed(1)+' SCFH'+" ("+leaknp_l.toFixed(0)+" L/min)";;
        document.getElementById("ans3").value=leakw.toFixed(1)+' SCFH'+" ("+leakw_l.toFixed(0)+" L/min)";;
        document.getElementById("ans4").value=leakwp.toFixed(1)+' SCFH'+" ("+leakwp_l.toFixed(0)+" L/min)";;
       
    }
}

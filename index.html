<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SquareFall Challenge</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="icon" href="icon-192.png">

<style>

body{
background:black;
color:white;
font-family:Arial;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
display:flex;
gap:20px;
width:95vw;
}

#board{
display:grid;
grid-template-columns:repeat(18,1fr);
gap:2px;
width:70vw;
height:80vh;
background:#111;
padding:6px;
}

.cell{
border-radius:3px;
cursor:pointer;
}

.panel{
width:25vw;
}

button{
width:100%;
padding:10px;
margin-top:10px;
font-weight:bold;
background:#3366ff;
color:white;
border:none;
}

table{
width:100%;
margin-top:10px;
}

td{
padding:4px;
}

</style>
</head>

<body>

<div class="container">

<div id="board"></div>

<div class="panel">

<h2>SquareFall Challenge</h2>

<div>Level: <span id="level">1</span></div>
<div>Score: <span id="score">0</span></div>
<div>Target: <span id="target">5000</span></div>

<button onclick="newGame()">New Game</button>

<h3>Top Scores</h3>
<table id="scores"></table>

</div>
</div>

<script>

const rows=14
const cols=18
const colors=["red","blue","green","yellow","magenta"]

let board=[]
let score=0
let level=1

function getTarget(level){
return Math.floor(5000*Math.pow(1.8,level-1))
}

function randomColor(){
return colors[Math.floor(Math.random()*colors.length)]
}

function newGame(){
score=0
level=1
newBoard()
}

function newBoard(){

board=[]

for(let r=0;r<rows;r++){
let row=[]
for(let c=0;c<cols;c++){
row.push(randomColor())
}
board.push(row)
}

draw()

}

function draw(){

const boardDiv=document.getElementById("board")
boardDiv.innerHTML=""

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

const cell=document.createElement("div")

if(board[r][c]){
cell.style.background=board[r][c]
cell.onclick=()=>clickCell(r,c)
}

cell.className="cell"

boardDiv.appendChild(cell)

}
}

document.getElementById("score").innerText=score
document.getElementById("level").innerText=level
document.getElementById("target").innerText=getTarget(level)

}

function group(r,c){

let color=board[r][c]
let stack=[[r,c]]
let visited=new Set()
let g=[]

while(stack.length){

let [x,y]=stack.pop()
let key=x+","+y

if(visited.has(key)) continue
visited.add(key)

if(board[x][y]!=color) continue

g.push([x,y])

let dirs=[[1,0],[-1,0],[0,1],[0,-1]]

for(let d of dirs){

let nx=x+d[0]
let ny=y+d[1]

if(nx>=0 && nx<rows && ny>=0 && ny<cols){
stack.push([nx,ny])
}

}

}

return g

}

function clickCell(r,c){

if(!board[r][c]) return

let g=group(r,c)

if(g.length<2) return

for(let s of g){
board[s[0]][s[1]]=null
}

let gained=g.length*g.length*10

score+=gained

gravity()
shift()

draw()

if(!moves()){
setTimeout(endBoard,200)
}

}

function gravity(){

for(let c=0;c<cols;c++){

let stack=[]

for(let r=rows-1;r>=0;r--){
if(board[r][c]) stack.push(board[r][c])
}

for(let r=rows-1;r>=0;r--){
board[r][c]=stack.shift()||null
}

}

}

function shift(){

let newCols=[]

for(let c=0;c<cols;c++){

let col=[]
let has=false

for(let r=0;r<rows;r++){
col.push(board[r][c])
if(board[r][c]) has=true
}

if(has)newCols.push(col)

}

while(newCols.length<cols){
newCols.push(Array(rows).fill(null))
}

for(let c=0;c<cols;c++){
for(let r=0;r<rows;r++){
board[r][c]=newCols[c][r]
}
}

}

function moves(){

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

let color=board[r][c]

if(!color) continue

if(r+1<rows && board[r+1][c]==color) return true
if(c+1<cols && board[r][c+1]==color) return true

}
}

return false
}

function remainingSquares(){

let count=0

for(let r=0;r<rows;r++)
for(let c=0;c<cols;c++)
if(board[r][c]) count++

return count

}

function endBoard(){

let target=getTarget(level)
let remaining=remainingSquares()

let bonus=0

if(remaining==0) bonus=5000
else if(remaining<=5) bonus=3000
else if(remaining<=10) bonus=2000
else if(remaining<=20) bonus=1000

score+=bonus

if(score>=target){

alert("Level "+(level+1)+" reached!")

level++
newBoard()

}else{

alert("Game Over\nScore: "+score)

let name=prompt("Enter your name")
if(!name) name="Player"

saveScore(name,score)

}

}

function saveScore(name,score){

let stored=localStorage.getItem("squarefall_scores")
let scores=stored?JSON.parse(stored):[]

scores.push({name:name,score:score})

scores.sort((a,b)=>b.score-a.score)

scores=scores.slice(0,10)

localStorage.setItem("squarefall_scores",JSON.stringify(scores))

showScores()

}

function showScores(){

let table=document.getElementById("scores")

table.innerHTML=""

let stored=localStorage.getItem("squarefall_scores")
let scores=stored?JSON.parse(stored):[]

scores.forEach((s,i)=>{

let row=document.createElement("tr")

row.innerHTML=
"<td>"+(i+1)+"</td>"+
"<td>"+s.name+"</td>"+
"<td>"+s.score+"</td>"

table.appendChild(row)

})

}

showScores()
newGame()

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>

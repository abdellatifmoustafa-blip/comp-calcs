<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SquareFall Challenge</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
margin-top:20px;
}

#game{
display:flex;
gap:40px;
}

#board{
display:grid;
grid-template-columns:repeat(14,40px);
grid-template-rows:repeat(9,40px);
gap:2px;
background:#333;
padding:10px;
}

.cell{
width:40px;
height:40px;
cursor:pointer;
}

.empty{
background:#222;
cursor:default;
}

.red{background:#e74c3c;}
.green{background:#27ae60;}
.blue{background:#3498db;}
.yellow{background:#f1c40f;}
.pink{background:#ff66cc;}

#panel{
width:220px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

table{
width:100%;
margin-top:10px;
}

td{
padding:4px;
}

#bonus{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:28px;
color:#ffd700;
display:none;
}

</style>

</head>

<body>

<div id="bonus"></div>

<div id="game">

<div id="board"></div>

<div id="panel">

<h2>SquareFall Challenge</h2>

<div>Level: <span id="level">1</span></div>
<div>Score: <span id="score">0</span></div>
<div>Target: <span id="target">5000</span></div>

<button onclick="newGame()">New Game</button>

<h3>Top Scores</h3>
<table id="scores"></table>

</div>
</div>

<script>

const rows=9
const cols=14
const TOTAL_BLOCKS = rows*cols

const colors=["red","green","blue","yellow","pink"]

const targets=[5000,11250,20000,31250,45000,61250,80000,101250]

let board=[]
let score=0
let level=1
let gameOver=false
let bonusGiven=false

const boardDiv=document.getElementById("board")

function randomColor(){
return colors[Math.floor(Math.random()*colors.length)]
}

function updatePanel(){
document.getElementById("score").innerText=score
document.getElementById("level").innerText=level
document.getElementById("target").innerText=targets[level-1] ?? "MAX"
}

function newBoard(){

bonusGiven=false

do{

board=[]

for(let r=0;r<rows;r++){

let row=[]

for(let c=0;c<cols;c++){

row.push(randomColor())

}

board.push(row)

}

}while(!hasMoves())

renderBoard()

checkBoardState()

}

function renderBoard(){

boardDiv.innerHTML=""

for(let r=0;r<rows;r++){

for(let c=0;c<cols;c++){

let cell=document.createElement("div")

let color=board[r][c]

cell.className="cell "+(color?color:"empty")

cell.dataset.r=r
cell.dataset.c=c

if(color && !gameOver){
cell.onclick=clickCell
}

boardDiv.appendChild(cell)

}

}

}

function countBlocks(){

let count=0

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){
if(board[r][c]!=null) count++
}}

return count

}

function showBonus(text){

let b=document.getElementById("bonus")

b.innerText=text
b.style.display="block"

setTimeout(()=>{b.style.display="none"},1500)

}

function clickCell(){

if(gameOver) return

let r=parseInt(this.dataset.r)
let c=parseInt(this.dataset.c)

let color=board[r][c]

let group=findGroup(r,c,color)

if(group.length<2) return

removeGroup(group)

collapse()

shiftColumns()

score+=group.length*group.length*10

updatePanel()

let remaining=countBlocks()
let cleared=TOTAL_BLOCKS-remaining
let percent=Math.floor((cleared/TOTAL_BLOCKS)*100)

if(!bonusGiven && percent>=86){

bonusGiven=true

let diff=percent-85
let bonus=diff*diff*60

score+=bonus

updatePanel()

showBonus("BONUS +"+bonus)

}

renderBoard()

checkBoardState()

}

function findGroup(sr,sc,color){

let stack=[[sr,sc]]
let visited=new Set()
let group=[]

while(stack.length){

let [r,c]=stack.pop()

let key=r+"-"+c

if(r<0||r>=rows||c<0||c>=cols) continue
if(visited.has(key)) continue

visited.add(key)

if(board[r][c]!=color) continue

group.push([r,c])

stack.push([r+1,c])
stack.push([r-1,c])
stack.push([r,c+1])
stack.push([r,c-1])

}

return group

}

function removeGroup(group){

for(let [r,c] of group){

board[r][c]=null

}

}

function collapse(){

for(let c=0;c<cols;c++){

let write=rows-1

for(let r=rows-1;r>=0;r--){

if(board[r][c]!=null){

board[write][c]=board[r][c]

if(write!=r) board[r][c]=null

write--

}

}

}

}

function shiftColumns(){

let write=0

for(let c=0;c<cols;c++){

let empty=true

for(let r=0;r<rows;r++){
if(board[r][c]!=null){
empty=false
break
}
}

if(!empty){

if(write!=c){

for(let r=0;r<rows;r++){

board[r][write]=board[r][c]
board[r][c]=null

}

}

write++

}

}

}

function hasMoves(){

for(let r=0;r<rows;r++){

for(let c=0;c<cols;c++){

let color=board[r][c]

if(!color) continue

if(c+1<cols && board[r][c+1]==color) return true
if(r+1<rows && board[r+1][c]==color) return true

}

}

return false

}

function checkBoardState(){

if(hasMoves()) return

let target=targets[level-1]

if(target && score>=target){

level++

newBoard()

updatePanel()

}else{

endGame()

}

}

function endGame(){

gameOver=true

let stored=localStorage.getItem("squarefall_scores")

let scores=stored?JSON.parse(stored):[]

let qualifies=scores.length<10 || score>scores[scores.length-1]?.score

if(qualifies){

let name=prompt("Game Over\nScore: "+score+"\nEnter your name:")

if(!name) name="Player"

scores.push({name,score})

scores.sort((a,b)=>b.score-a.score)

scores=scores.slice(0,10)

localStorage.setItem("squarefall_scores",JSON.stringify(scores))

}else{

alert("Game Over\nScore: "+score)

}

showScores()

}

function showScores(){

let table=document.getElementById("scores")

table.innerHTML=""

let stored=localStorage.getItem("squarefall_scores")

let scores=stored?JSON.parse(stored):[]

scores.forEach((s,i)=>{

let row=document.createElement("tr")

row.innerHTML="<td>"+(i+1)+"</td><td>"+s.name+"</td><td>"+s.score+"</td>"

table.appendChild(row)

})

}

function newGame(){

score=0
level=1
gameOver=false

updatePanel()

newBoard()

showScores()

}

newGame()

</script>

</body>
</html>
